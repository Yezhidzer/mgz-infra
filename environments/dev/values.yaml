global:
  namespace: dev

api-gateway:
  replicaCount: 1
  image:
    repository: ghcr.io/yezhidzer/api-service
    tag: dev-latest
  config:
    GATEWAY_PORT: "8080"
    AUTH_SERVICE_URL: "http://auth-service:8081"
    CHAT_SERVICE_URL: "chat-service:50051"
    USER_SERVICE_URL: "user-service:50052"
  ingress:
    enabled: true
    className: nginx
    host: api.dev.local
    path: /
    pathType: Prefix

auth-service:
  replicaCount: 1
  image:
    repository: ghcr.io/yezhidzer/auth-service
    tag: dev-latest
  config:
    SERVER_PORT: "8081"
    DATABASE_URL: "postgres://postgres:postgres@postgresql:5432/auth?sslmode=disable"
    REDIS_URL: "redis://redis:6379/0"
    JWT_ACCESS_TTL_MINUTES: "15"
    JWT_REFRESH_TTL_DAYS: "7"

chat-service:
  replicaCount: 1
  image:
    repository: ghcr.io/yezhidzer/chat-service
    tag: dev-latest
  config:
    GRPC_PORT: "50051"
    REDIS_ADDR: "redis:6379"
    REDIS_DB: "0"
    CACHE_TTL: "20m"
  secret:
    DATABASE_URL: "postgres://postgres:postgres@postgresql:5432/chat_message?sslmode=disable"

user-service:
  replicaCount: 1
  image:
    repository: ghcr.io/yezhidzer/user-service
    tag: dev-latest
  config:
    GRPC_PORT: "50052"
    S3_ENDPOINT: "minio:9000"
    S3_BUCKET: "users"
    S3_USE_SSL: "false"
  secret:
    DATABASE_URL: "postgres://postgres:postgres@postgresql:5432/user_service?sslmode=disable"
    S3_ACCESS_KEY: "minioadmin"
    S3_SECRET_KEY: "minioadmin"

postgresql:
  persistence:
    size: 5Gi

redis: {}

minio:
  config:
    bucketName: "users"
  persistence:
    size: 5Gi
