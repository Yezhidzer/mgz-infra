replicaCount: 1

image:
  repository: your-dockerhub-or-registry/chat-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 50051
  metricsPort: 9101

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  port: metrics

container:
  port: 50051
  metricsPort: 9101

metrics:
  enabled: true
  port: 9101
  path: /metrics
  
config:
  GRPC_PORT: "50051"
  METRICS_PORT: "9101"
  REDIS_ADDR: "redis:6379"
  REDIS_DB: "0"
  CACHE_TTL: "20m"

migration:
  image:
    repository: migrate/migrate
    tag: v4.18.3
    pullPolicy: IfNotPresent

secret:
  DATABASE_URL: "postgres://postgres:postgres@postgresql:5432/chat_message?sslmode=disable"

