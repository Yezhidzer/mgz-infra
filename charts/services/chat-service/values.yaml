replicaCount: 1

image:
  repository: your-dockerhub-or-registry/chat-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 50051

container:
  port: 50051

metrics:
  port: 9101
  
config:
  GRPC_PORT: "50051"
  REDIS_ADDR: "redis:6379"
  REDIS_DB: "0"
  CACHE_TTL: "20m"

migration:
  image:
    repository: migrate/migrate
    tag: v4.18.3
    pullPolicy: IfNotPresent

secret:
  DATABASE_URL: "postgres://postgres:postgres@postgresql:5432/chat_message?sslmode=disable"

metrics:
  enabled: true
  path: /metrics
  port: 9101
