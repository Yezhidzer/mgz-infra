replicaCount: 1

image:
  repository: your-dockerhub-or-registry/auth-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081
  metricsPort: 8081

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  port: http

container:
  port: 8081

config:
  SERVER_PORT: "8081"
  DATABASE_URL: "postgres://postgres:postgres@postgresql:5432/auth?sslmode=disable"
  REDIS_URL: "redis://redis:6379/0"
  JWT_ACCESS_TTL_MINUTES: "15"
  JWT_REFRESH_TTL_DAYS: "7"

secret:
  JWT_SECRET: "change-me"

metrics:
  enabled: true
  path: /metrics
  port: 8081
