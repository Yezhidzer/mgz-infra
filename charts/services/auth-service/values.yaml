replicaCount: 1

image:
  repository: your-dockerhub-or-registry/auth-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

container:
  port: 8081

config:
  APP_PORT: "8081"
  DATABASE_HOST: "postgresql"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "auth"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

secret:
  DATABASE_USER: "postgres"
  DATABASE_PASSWORD: "postgres"
  JWT_SECRET: "change-me"
