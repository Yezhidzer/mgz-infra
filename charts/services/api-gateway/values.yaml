replicaCount: 1

image:
  repository: your-dockerhub-or-registry/api-gateway
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  metricsPort: 8080

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  port: http

container:
  port: 8080

config:
  GATEWAY_PORT: "8080"
  AUTH_SERVICE_URL: "http://auth-service:8081"
  CHAT_SERVICE_URL: "chat-service:50051"
  USER_SERVICE_URL: "user-service:50052"

secret:
  JWT_SECRET: "change-me"

ingress:
  enabled: true
  className: nginx
  host: api.dev.local
  path: /
  pathType: Prefix

metrics:
  enabled: true
  path: /metrics
  port: 8080
