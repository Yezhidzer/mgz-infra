apiVersion: v1
kind: Service
metadata:
  name: api-gateway 
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
spec:
  type: {{ .Values.service.type }}
  selector:
    app: api-gateway
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.container.port }}
      protocol: TCP
