replicaCount: 1

image:
  repository: your-dockerhub-or-registry/user-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 50052
  metricsPort: 9090

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  port: metrics

container:
  port: 50052
  metricsPort: 9090

config:
  GRPC_PORT: "50052"
  METRICS_PORT: "9090"
  S3_ENDPOINT: "minio:9000"
  S3_BUCKET: "users"
  S3_USE_SSL: "false"

migration:
  image:
    repository: migrate/migrate
    tag: v4.18.3
    pullPolicy: IfNotPresent
    
secret:
  DATABASE_URL: "postgres://postgres:postgres@postgresql:5432/user_service?sslmode=disable"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"

metrics:
  enabled: true
  path: /metrics
  port: 9102
